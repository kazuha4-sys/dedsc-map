<!DOCTYPE html>
<html>
<head>
  <title>DEDSEC GPS 💀</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

  <style>
    body {
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background:black;
      color:white;
    }

    #map {
      height: calc(100vh - 60px);
    }

    /* HEADER */
    header {
      height:60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:0 15px;
      background:rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border-bottom:1px solid #222;
    }

    .logo {
      font-weight:bold;
    }

    .points-btn {
      cursor:pointer;
    }

    /* MENU */
    #menu {
      position:fixed;
      top:60px;
      right:0;
      width:260px;
      height:100%;
      background:rgba(20,20,20,0.9);
      backdrop-filter: blur(15px);
      border-left:1px solid #333;
      overflow-y:auto;
      transform:translateX(100%);
      transition:0.3s;
      z-index:1000;
    }

    #menu.active {
      transform:translateX(0);
    }

    .ponto {
      padding:12px;
      border-bottom:1px solid #333;
    }

    button {
      margin-top:5px;
      margin-right:5px;
      padding:5px 10px;
      border:none;
      border-radius:8px;
      background:#111;
      color:white;
      cursor:pointer;
    }

    /* BOTÕES FLUTUANTES */
    .fab {
      position:fixed;
      bottom:20px;
      right:20px;
      display:flex;
      flex-direction:column;
      gap:10px;
      z-index:999;
    }

    .fab button {
      width:55px;
      height:55px;
      border-radius:50%;
      background:rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,0.2);
      font-size:20px;
    }

  </style>
</head>
<body>

<header>
  <div class="logo">DEDSEC 💀</div>
  <div class="points-btn" onclick="toggleMenu()">
    Pontos: <span id="count">0</span>
  </div>
</header>

<div id="map"></div>
<div id="menu"></div>

<!-- BOTÕES FLUTUANTES -->
<div class="fab">
  <button onclick="centralizar()">📍</button>
  <button onclick="addPontoManual()">＋</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
  var map = L.map('map').setView([-23.5505, -46.6333], 13);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap & CartoDB'
  }).addTo(map);

  let pontos = JSON.parse(localStorage.getItem("pontos")) || [];

  function salvarPontos(){
    localStorage.setItem("pontos", JSON.stringify(pontos));
    atualizarMenu();
  }

  function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
  }

  function atualizarMenu(){
    const menu = document.getElementById("menu");
    const count = document.getElementById("count");

    count.innerText = pontos.length;
    menu.innerHTML = "";

    if(pontos.length === 0){
      menu.innerHTML = "<p style='padding:10px'>Nenhum ponto 😢</p>";
      return;
    }

    pontos.forEach((p,i)=>{
      const div = document.createElement("div");
      div.className = "ponto";

      div.innerHTML = `
        <b>${p.nome}</b><br>
        <button onclick="irAte(${p.lat}, ${p.lng})">Ir 🚀</button>
        <button onclick="deletar(${i})">Excluir ❌</button>
      `;

      menu.appendChild(div);
    });
  }

  function deletar(index){
    pontos.splice(index,1);
    salvarPontos();
    location.reload();
  }

  function criarPonto(lat, lng, nome){
    L.marker([lat, lng]).addTo(map).bindPopup(nome);

    L.circle([lat, lng], {
      radius:300,
      color:'lime'
    }).addTo(map);
  }

  pontos.forEach(p => criarPonto(p.lat, p.lng, p.nome));
  atualizarMenu();

  // ROTA
  let rotaControl = null;

  function irAte(lat,lng){
    if(!userMarker) return alert("Sem localização 😅");

    let userPos = userMarker.getLatLng();

    if(rotaControl){
      map.removeControl(rotaControl);
    }

    rotaControl = L.Routing.control({
      waypoints:[
        L.latLng(userPos.lat,userPos.lng),
        L.latLng(lat,lng)
      ],
      addWaypoints:false,
      routeWhileDragging:false,
      show:false
    }).addTo(map);
  }

  // GPS
  let userMarker = null;

  navigator.geolocation.watchPosition(pos=>{
    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    if(userMarker){
      userMarker.setLatLng([lat,lng]);
    } else {
      userMarker = L.marker([lat,lng]).addTo(map).bindPopup("Você 😈").openPopup();
    }
  });

  function centralizar(){
    if(userMarker){
      map.setView(userMarker.getLatLng(), 16);
    }
  }

  function addPontoManual(){
    if(!userMarker) return alert("Sem GPS 😅");

    let nome = prompt("Nome do local:");
    if(!nome) return;

    let pos = userMarker.getLatLng();

    pontos.push({
      lat: pos.lat,
      lng: pos.lng,
      nome
    });

    salvarPontos();
    location.reload();
  }

  // clique mapa
  map.on('click', e=>{
    let nome = prompt("Nome do local:");

    if(nome){
      pontos.push({
        lat:e.latlng.lat,
        lng:e.latlng.lng,
        nome
      });

      salvarPontos();
      location.reload();
    }
  });

</script>

</body>
</html>
