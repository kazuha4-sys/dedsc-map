<!DOCTYPE html>
<html  lang="en">
<head>
  <title>Dedsc</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

  <style>
    body {
      margin:0;
      font-family: monospace;
      background:black;
      color:#00ff9c;
    }

    #map {
      height: calc(100vh - 60px);
    }

    header {
      height:60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:0 15px;
      background:black;
      border-bottom:1px solid #00ff9c;
    }

    .logo {
      font-weight:bold;
      letter-spacing:2px;
    }

    .points-btn {
      cursor:pointer;
    }

    /* MENU DEDSEC */
    #menu {
      position:fixed;
      top:60px;
      right:0;
      width:280px;
      height:100%;
      background:black;
      border-left:2px solid #00ff9c;
      overflow-y:auto;
      transform:translateX(100%);
      transition:0.3s;
      z-index:1000;
      padding:10px;
    }

    #menu.active {
      transform:translateX(0);
    }

    .ponto {
      margin-bottom:15px;
      padding:10px;
      border:1px solid rgba(0,255,156,0.2);
      background:rgba(0,255,156,0.05);
    }

    .ponto b {
      color:#00ff9c;
    }

    .ponto button {
      margin-top:5px;
      padding:5px;
      font-size:12px;
      background:black;
      border:1px solid #00ff9c;
      color:#00ff9c;
      cursor:pointer;
    }

    .ponto button:hover {
      background:#00ff9c;
      color:black;
    }

    /* BOTÕES FLUTUANTES */
    .fab {
      position:fixed;
      bottom:20px;
      right:20px;
      display:flex;
      flex-direction:column;
      gap:10px;
      z-index:999;
    }

    .fab button {
      width:55px;
      height:55px;
      border-radius:50%;
      background:black;
      border:1px solid #00ff9c;
      color:#00ff9c;
      font-size:20px;
    }

    /* BOOT */
    #boot {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:black;
      color:#00ff9c;
      font-family: monospace;
      padding:20px;
      z-index:9999;
    }

    .boot-text {
      white-space: pre-line;
      font-size:14px;
    }
  </style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  <div class="boot-text" id="bootText"></div>
</div>

<header>
  <div class="logo">DEDSC MAP</div>
  <div class="points-btn" onclick="toggleMenu()">
    [PONTOS: <span id="count">0</span>]
  </div>
</header>

<div id="map"></div>
<div id="menu"></div>

<div class="fab">
  <button onclick="centralizar()">📍</button>
  <button onclick="addPontoManual()">＋</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
  // BOOT
  const linhas = [
    "booting dedsec system...",
    "injecting modules...",
    "gps access granted...",
    "breaching security...",
    "system online 😈"
  ];

  let i = 0;
  let text = document.getElementById("bootText");

  function escreverLinha(){
    if(i < linhas.length){
      text.innerHTML += linhas[i] + "\\n";
      i++;
      setTimeout(escreverLinha, 400);
    } else {
      setTimeout(() => {
        document.getElementById("boot").style.display = "none";
      }, 800);
    }
  }



  escreverLinha();

  // ======= TEU JS (INALTERADO) =======

  var map = L.map('map').setView([-23.5505, -46.6333], 13);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap & CartoDB'
  }).addTo(map);

  let pontos = JSON.parse(localStorage.getItem("pontos")) || [];

  function salvarPontos(){
    localStorage.setItem("pontos", JSON.stringify(pontos));
    atualizarMenu();
  }

  function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
  }

  function atualizarMenu(){
    const menu = document.getElementById("menu");
    const count = document.getElementById("count");

    count.innerText = pontos.length;
    menu.innerHTML = "";

    if(pontos.length === 0){
      menu.innerHTML = "<p style='padding:10px'>Nenhum ponto 😢</p>";
      return;
    }

    pontos.forEach((p,i)=>{
      const div = document.createElement("div");
      div.className = "ponto";

      div.innerHTML = `
        <b>${p.nome}</b><br>
        <button onclick="irAte(${p.lat}, ${p.lng})">Ir 🚀</button>
        <button onclick="deletar(${i})">Excluir ❌</button>
      `;

      menu.appendChild(div);
    });
  }

  function deletar(index){
    pontos.splice(index,1);
    salvarPontos();
    location.reload();
  }

  function criarPonto(lat, lng, nome){
    L.marker([lat, lng]).addTo(map).bindPopup(nome);

    L.circle([lat, lng], {
      radius:300,
      color:'lime'
    }).addTo(map);
  }

  pontos.forEach(p => criarPonto(p.lat, p.lng, p.nome));
  atualizarMenu();

  let rotaControl = null;

  function irAte(lat,lng){
    if(!userMarker) return alert("Sem localização 😅");

    let userPos = userMarker.getLatLng();

    if(rotaControl){
      map.removeControl(rotaControl);
    }

    rotaControl = L.Routing.control({
      waypoints:[
        L.latLng(userPos.lat,userPos.lng),
        L.latLng(lat,lng)
      ],
      addWaypoints:false,
      routeWhileDragging:false,
      show:false
    }).addTo(map);
  }

  let userMarker = null;

  navigator.geolocation.watchPosition(pos=>{
    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    if(userMarker){
      userMarker.setLatLng([lat,lng]);
    } else {
      userMarker = L.marker([lat,lng]).addTo(map).bindPopup("Você 😈").openPopup();
    }
  });

  function centralizar(){
    if(userMarker){
      map.setView(userMarker.getLatLng(), 16);
    }
  }

  function addPontoManual(){
    if(!userMarker) return alert("Sem GPS 😅");

    let nome = prompt("Nome do local:");
    if(!nome) return;

    let pos = userMarker.getLatLng();

    pontos.push({
      lat: pos.lat,
      lng: pos.lng,
      nome
    });

    salvarPontos();
    location.reload();
  }

  map.on('click', e=>{
    let nome = prompt("Nome do local:");

    if(nome){
      pontos.push({
        lat:e.latlng.lat,
        lng:e.latlng.lng,
        nome
      });

      salvarPontos();
      location.reload();
    }
  });
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js")
    .then(() => console.log("SW rodando 😈"))
    .catch(err => console.log("Erro SW:", err));
}
</script>

</body>
</html>
